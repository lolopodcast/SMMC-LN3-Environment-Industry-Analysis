/* === Frontend Security & DRM (0412 Guideline) === */
// 1. Domain Lock
const allowedDomains = ['lolopodcast.github.io', 'localhost', '127.0.0.1', '']; 
const currentDomain = window.location.hostname;
const isAllowed = allowedDomains.some(d => currentDomain.includes(d)) || currentDomain === ''; 
if (!isAllowed) {
    window.location.href = 'https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo';
}

// 2. Smart Context Menu & Keyboard Shortcuts Blocker
const ipMessage = "Intellectual Property of Prof. Shihmin Lo";
document.addEventListener('contextmenu', (e) => {
    const selection = window.getSelection().toString();
    // Allow right click if text is selected for dictionary/copy
    if (selection.length > 0) return; 
    e.preventDefault();
    alert(ipMessage);
});

document.addEventListener('keydown', (e) => {
    // Exemptions: Ctrl+P (Print), Ctrl+S (Save)
    if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 's')) return;
    
    // Block F12, Ctrl+U, Ctrl+Shift+I/J/C
    if (e.key === 'F12' || 
       (e.ctrlKey && e.key === 'u') || 
       (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'i', 'j', 'c'].includes(e.key))) {
        e.preventDefault();
        alert(ipMessage);
    }
});
</script>

const FiveForcesDiagram = ({lang}) => {
  const [active, setActive] = useState(null);
  const forces = [
    { id:'rivals', label: lang==='zh'?'既有競爭者對抗':'Industry Rivalry', x:50, y:50, color:'#004030', desc: lang==='zh'?'產業內現有廠商之間的競爭強度，受集中度、差異化、退出障礙等影響。':'Intensity of competition among existing firms, affected by concentration, differentiation, exit barriers.' },
    { id:'entry', label: lang==='zh'?'新進入者威脅':'Threat of Entry', x:50, y:18, color:'#b45309', desc: lang==='zh'?'進入障礙高低決定新進者對產業獲利的威脅程度。':'Height of entry barriers determines the threat new entrants pose to profitability.' },
    { id:'substitutes', label: lang==='zh'?'替代品威脅':'Substitutes', x:50, y:82, color:'#7c3aed', desc: lang==='zh'?'替代品的價格-效能比越高，越能限制產業的定價能力。':'Higher price-performance of substitutes constrains industry pricing power.' },
    { id:'buyers', label: lang==='zh'?'買方議價力':'Buyer Power', x:82, y:50, color:'#0369a1', desc: lang==='zh'?'買方集中度越高、轉換成本越低，買方議價力越強。':'Higher buyer concentration and lower switching costs increase buyer power.' },
    { id:'suppliers', label: lang==='zh'?'供應商議價力':'Supplier Power', x:18, y:50, color:'#be123c', desc: lang==='zh'?'供應商越集中、差異化越高，其議價力越強。':'More concentrated and differentiated suppliers have stronger bargaining power.' },
  ];
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'🔬 互動式五力分析圖':'🔬 Interactive Five Forces Diagram'}</h3>
      <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">{lang==='zh'?'點擊各力量查看詳細說明':'Click each force to see details'}</p>
      
      <div className="max-w-xl mx-auto relative w-full bg-slate-50/50 dark:bg-slate-900/20 rounded-xl my-4" style={{paddingBottom:'60%'}}>
        {forces.map(f => (
          <button key={f.id} onClick={() => setActive(active===f.id?null:f.id)}
            className={`absolute flex items-center justify-center p-1.5 sm:p-2 rounded-lg text-[10px] sm:text-xs font-bold transition-all shadow-md border-2 whitespace-normal break-words leading-tight w-20 sm:w-28 h-12 sm:h-14 ${active===f.id?'scale-110 ring-2 ring-offset-2 ring-[#D8C3A5] z-10':'hover:scale-105 z-0'}`}
            style={{left:`${f.x}%`, top:`${f.y}%`, transform:'translate(-50%,-50%)', backgroundColor: f.color, color:'white', borderColor: active===f.id?'#D8C3A5':f.color}}>
            {f.label}
          </button>
        ))}
        <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
          <line x1="50" y1="30" x2="50" y2="38" stroke="#D8C3A5" strokeWidth="0.5" strokeDasharray="2"/>
          <line x1="50" y1="70" x2="50" y2="62" stroke="#D8C3A5" strokeWidth="0.5" strokeDasharray="2"/>
          <line x1="30" y1="50" x2="38" y2="50" stroke="#D8C3A5" strokeWidth="0.5" strokeDasharray="2"/>
          <line x1="70" y1="50" x2="62" y2="50" stroke="#D8C3A5" strokeWidth="0.5" strokeDasharray="2"/>
        </svg>
      </div>
      
      {active && <div className="mt-4 p-4 bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl border border-[#004030]/20 dark:border-[#D8C3A5]/20 animate-fade-in min-h-[70px] flex items-center">
        <p className="text-sm text-slate-700 dark:text-slate-300 w-full">{forces.find(f=>f.id===active)?.desc}</p>
      </div>}
    </div>
  );
};

const HHICalculator = ({lang}) => {
  const [shares, setShares] = useState([40, 30, 20, 10]);
  const hhi = shares.reduce((sum, s) => sum + s*s, 0);
  const cr4 = shares.reduce((sum, s) => sum + s, 0);
  const getLevel = () => hhi < 1500 ? (lang==='zh'?'低度集中':'Low Concentration') : hhi < 2500 ? (lang==='zh'?'中度集中':'Moderate Concentration') : (lang==='zh'?'高度集中':'High Concentration');
  const colors = ['#004030','#0369a1','#D8C3A5','#b45309'];
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'📊 HHI 集中度計算器':'📊 HHI Concentration Calculator'}</h3>
      <div className="space-y-3 mb-4">
        {shares.map((s,i) => (
          <div key={i} className="flex items-center gap-3">
            <span className="text-xs font-bold w-16 shrink-0" style={{color:colors[i]}}>{lang==='zh'?`廠商 ${i+1}`:`Firm ${i+1}`}</span>
            <input type="range" min="0" max="100" value={s} onChange={e => { const n=[...shares]; n[i]=+e.target.value; setShares(n); }} className="flex-1 h-2 rounded-lg appearance-none cursor-pointer" style={{accentColor:colors[i]}}/>
            <span className="text-sm font-mono w-10 text-right">{s}%</span>
          </div>
        ))}
      </div>
      <div className="flex items-center gap-1 mb-4">
        {shares.map((s,i) => (
          <div key={i} style={{width:`${s}%`, backgroundColor:colors[i], minWidth: s>0?'4px':'0'}} className="h-4 rounded transition-all duration-300"/>
        ))}
      </div>
      <div className="grid grid-cols-3 gap-2 text-center">
        <div className="bg-slate-100 dark:bg-slate-700 rounded-lg p-3">
          <p className="text-lg font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{hhi}</p>
          <p className="text-xs text-slate-500">HHI</p>
        </div>
        <div className="bg-slate-100 dark:bg-slate-700 rounded-lg p-3">
          <p className="text-lg font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{cr4}%</p>
          <p className="text-xs text-slate-500">CR4</p>
        </div>
        <div className="bg-slate-100 dark:bg-slate-700 rounded-lg p-3">
          <p className="text-sm font-bold text-[#004030] dark:text-[#D8C3A5] mt-1">{getLevel()}</p>
          <p className="text-xs text-slate-500 mt-1">{lang==='zh'?'集中程度':'Level'}</p>
        </div>
      </div>
    </div>
  );
};

const BarrierSimulator = ({lang}) => {
  const [capital, setCapital] = useState(3);
  const [scale, setScale] = useState(3);
  const [brand, setBrand] = useState(2);
  const [regulation, setRegulation] = useState(4);
  const avg = ((capital+scale+brand+regulation)/4).toFixed(1);
  const items = [
    { label: lang==='zh'?'資本需求':'Capital Req.', val: capital, set: setCapital, color:'#004030' },
    { label: lang==='zh'?'規模經濟':'Scale Econ.', val: scale, set: setScale, color:'#0369a1' },
    { label: lang==='zh'?'品牌忠誠':'Brand Loyalty', val: brand, set: setBrand, color:'#D8C3A5' },
    { label: lang==='zh'?'法規障礙':'Regulation', val: regulation, set: setRegulation, color:'#b45309' },
  ];
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'🏗️ 進入障礙模擬器':'🏗️ Entry Barrier Simulator'}</h3>
      <div className="space-y-4 mb-5">
        {items.map((it,i) => (
          <div key={i}>
            <div className="flex justify-between text-xs mb-1"><span className="font-bold text-slate-700 dark:text-slate-300">{it.label}</span><span className="text-slate-500">{it.val}/5</span></div>
            <input type="range" min="1" max="5" value={it.val} onChange={e=>it.set(+e.target.value)} className="w-full h-2 rounded appearance-none cursor-pointer" style={{accentColor:it.color}}/>
          </div>
        ))}
      </div>
      <div className="text-center bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-4 border border-[#004030]/10 dark:border-[#D8C3A5]/10">
        <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{avg}/5.0</p>
        <p className="text-xs text-slate-500">{lang==='zh'?'綜合進入障礙高度':'Overall Entry Barrier Height'}</p>
        <p className="text-sm mt-2 font-bold">{avg>=4?(lang==='zh'?'🔒 極高障礙':'🔒 Very High'):avg>=3?(lang==='zh'?'🔐 中高障礙':'🔐 Moderate-High'):avg>=2?(lang==='zh'?'🔓 中低障礙':'🔓 Moderate-Low'):(lang==='zh'?'🔓 低障礙':'🔓 Low')}</p>
      </div>
    </div>
  );
};

const ProfitabilityChart = ({lang}) => {
  const data = [
    { name: lang==='zh'?'菸草':'Tobacco', roe: 36.2 },
    { name: lang==='zh'?'家用品':'Household', roe: 27.0 },
    { name: lang==='zh'?'製藥':'Pharma', roe: 20.5 },
    { name: lang==='zh'?'食品服務':'Food Svc', roe: 21.7 },

/* ===== Interactive Engines (Cards & Quizzes) ===== */

const CardContainer = ({ allCards, t, moduleId, onCardTrack }) => {
  const [indices, setIndices] = useState([]);
  
  const shuffleAndPick = () => {
    const shuffled = [...Array(allCards.length).keys()].sort(() => Math.random() - 0.5);
    setIndices(shuffled.slice(0, 2)); // Show 2 at a time
  };

  useEffect(() => { shuffleAndPick(); }, [allCards, moduleId]);

  const handleNext = () => {
    shuffleAndPick();
  };

  return (
    <div className="mt-10 mb-8 select-none">
      <div className="flex justify-between items-end mb-4 border-b border-[#004030]/20 dark:border-[#D8C3A5]/20 pb-2">
         <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500">{t.key_terms}</h3>
         <span className="text-xs text-slate-400 bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded">{t.cards_random}</span>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {indices.map(idx => (
          <FlipCard key={idx} data={allCards[idx]} t={t} onFlip={() => onCardTrack(moduleId, 1, allCards.length)} />
        ))}
      </div>
      <div className="mt-4 flex justify-end">
        <button onClick={handleNext} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-sm font-bold rounded text-slate-600 dark:text-slate-300 transition-colors">
          {t.next_batch} ↻
        </button>
      </div>
    </div>
  );
};

const FlipCard = ({ data, t, onFlip }) => {
  const [flipped, setFlipped] = useState(false);
  const handleClick = () => {
    if (!flipped) onFlip();
    setFlipped(!flipped);
  };
  return (
    <div className="perspective cursor-pointer h-40" onClick={handleClick}>
      <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped ? 'rotate-y-180' : ''}`}>
        <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm hover:border-[#D8C3A5] transition-colors">
          <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5] text-base">{data.front}</p>
          <p className="text-xs text-slate-400 mt-3">{t.flip_prompt}</p>
        </div>
        <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-5 flex items-center justify-center shadow-md">
          <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed overflow-y-auto max-h-full">{data.back}</p>
        </div>
      </div>
    </div>
  );
};

const QuizContainer = ({ questions, t, moduleId, onQuizTrack }) => {
  const [indices, setIndices] = useState([]);
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const shuffleAndPick = () => {
    const shuffled = [...Array(questions.length).keys()].sort(() => Math.random() - 0.5);
    setIndices(shuffled.slice(0, 2)); // Show 2 at a time based on 0412 spec
    setSelected({});
    setSubmitted(false);
  };

  useEffect(() => { shuffleAndPick(); }, [questions, moduleId]);

  const handleSubmit = () => {
    setSubmitted(true);
    let correctCount = 0;
    indices.forEach((qIdx, i) => {
      if (selected[i] === questions[qIdx].ans) correctCount++;
    });
    onQuizTrack(moduleId, correctCount, indices.length);
  };

  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <div className="flex justify-between items-end mb-6">
        <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5]">{t.quiz_title}</h3>
        <span className="text-xs text-slate-400 bg-slate-200 dark:bg-slate-800 px-2 py-1 rounded">{t.quiz_random}</span>
      </div>
      
      {indices.map((qIdx, i) => {
        const q = questions[qIdx];
        const isCorrect = submitted && selected[i] === q.ans;
        const isWrong = submitted && selected[i] !== q.ans;
        return (
          <div key={qIdx} className="mb-6 bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
            <p className="font-bold mb-4 text-sm leading-relaxed text-slate-800 dark:text-slate-200">Q{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => {
                let btnClass = "border-slate-200 dark:border-slate-700 hover:border-slate-400 text-slate-600 dark:text-slate-300";
                if (submitted) {
                  if (oIdx === q.ans) btnClass = "bg-green-100 border-green-500 text-green-800 dark:bg-green-900/40 dark:border-green-500 dark:text-green-200";
                  else if (selected[i] === oIdx) btnClass = "bg-red-50 border-red-400 text-red-800 dark:bg-red-900/30 dark:border-red-500 dark:text-red-200";
                  else btnClass = "opacity-50 border-slate-200 dark:border-slate-700 text-slate-400";
                } else if (selected[i] === oIdx) {
                  btnClass = "border-[#004030] bg-[#004030]/5 text-[#004030] dark:border-[#D8C3A5] dark:bg-[#D8C3A5]/10 dark:text-[#D8C3A5] font-bold";
                }

                return (
                  <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                    className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm ${btnClass}`}>
                    {opt}
                  </button>
                );
              })}
            </div>
            
            {/* Visual Feedback as requested */}
            {submitted && isCorrect && (
              <div className="mt-3 p-3 bg-green-50 dark:bg-green-900/20 rounded border border-green-200 dark:border-green-800 flex items-start gap-2">
                <IconCheckCircle className="text-green-600 dark:text-green-400 shrink-0 mt-0.5" size={16}/>
                <div>
                  <span className="text-xs font-bold text-green-700 dark:text-green-400">{t.correct_praise}</span>
                  <p className="text-xs text-green-800 dark:text-green-300 mt-1">{t.explanation}: {q.exp}</p>
                </div>
              </div>
            )}
            {submitted && isWrong && (
              <div className="mt-3 p-3 bg-red-50 dark:bg-red-900/20 rounded border border-red-200 dark:border-red-800 flex items-start gap-2">
                <IconXCircle className="text-red-600 dark:text-red-400 shrink-0 mt-0.5" size={16}/>
                <div>
                  <span className="text-xs font-bold text-red-700 dark:text-red-400">{t.wrong_encourage}</span>
                  <p className="text-xs text-red-800 dark:text-red-300 mt-1">{t.explanation}: {q.exp}</p>
                </div>
              </div>
            )}
          </div>
        );
      })}
      
      <div className="flex items-center gap-4 mt-2">
        {!submitted ? (
          <button onClick={handleSubmit}
            disabled={Object.keys(selected).length < indices.length}
            className="px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 text-sm shadow-md transition-colors hover:bg-[#002b20] dark:hover:bg-white">
            {t.submit}
          </button>
        ) : (
          <button onClick={shuffleAndPick}
            className="px-6 py-2.5 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white font-bold rounded-lg text-sm shadow-sm transition-colors hover:bg-slate-300 dark:hover:bg-slate-600">
            {t.retry_next} ↻
          </button>
        )}
      </div>
    </div>
  );
};

  "「為了獲利，企業必須為顧客創造價值。因此，它必須理解顧客、管理供應商關係、並掌握競爭動態。這三組核心關係構成了企業的產業環境。」— Robert M. Grant。",

],

m2_nav:"2. 產業組織經濟學",
m2_title:"產業結構的經濟學基礎",
m2_overview:"介紹產業組織經濟學(IO)的核心架構，理解市場集中度如何影響廠商行為與獲利。",
m2_highlights:"SCP 典範、市場結構光譜、寡占、HHI 指數。",
m2_deepdive:[
  "產業分析的理論根基來自產業組織經濟學（Industrial Organization, IO），其核心是「結構—行為—績效」（Structure-Conduct-Performance, SCP）典範。SCP 認為產業的基本條件決定了市場結構，結構限制廠商行為，行為最終決定了產業的獲利績效。",
  "市場結構的光譜涵蓋了兩個極端：完全競爭（眾多廠商、無進出障礙、產品同質，利潤降至資本成本）與完全獨占（單一廠商、極高障礙，獲取全部超額利潤）。現實中的大多數產業則落在光譜中間的「寡占」（Oligopoly）或「獨占性競爭」。",
  "為了量化結構，我們經常使用集中度指標。CR4（前四大廠商市占率）是最直觀的指標；而 HHI（赫芬達爾-赫希曼指數）則透過計算所有廠商市占率的平方和，更精確地反映市場力量的集中程度。HHI 超過 2500 通常被視為高度集中的市場。"
],
m2_wrapup:"理解 SCP 典範，能幫助策略制定者看透現象背後的經濟邏輯，預判產業結構變遷對整體獲利水準的深遠影響。",
m2_cards:[
  { front:"SCP 典範", back:"Structure(結構)-Conduct(行為)-Performance(績效)。產業經濟學的核心架構，指出產業特徵決定競爭動態與獲利。" },
  { front:"寡占 (Oligopoly)", back:"由少數幾家大型企業主導的市場結構，廠商間存在高度的策略相互依存性。" },
  { front:"HHI 指數", back:"Herfindahl-Hirschman Index。計算各廠商市占率的平方和，是用以評估市場集中度與併購審查的重要量化指標。" },
  { front:"Lerner Index", back:"用以衡量企業市場力量（定價能力）的指標，公式為 (P - MC) / P。完全競爭下其值為零。" }
],
m2_q:[
  { q:"SCP 典範中的 S、C、P 分別代表什麼？", opts:["Strategy, Competition, Profit","Structure, Conduct, Performance","Supply, Cost, Price","Scale, Capability, Position"], ans:1, exp:"結構(Structure)、行為(Conduct)、績效(Performance)。" },
  { q:"在美國反托拉斯審查中，HHI 值超過多少被視為「高度集中」？", opts:["1000","1500","2500","5000"], ans:2, exp:"HHI > 2500 即代表高度集中的市場結構。" },
  { q:"下列何者不是「完全競爭」市場的前提特徵？", opts:["無數的買方與賣方","產品完全同質","極高的進入與退出障礙","資訊完全流通"], ans:2, exp:"完全競爭的核心特徵之一是「無進出障礙」（Free entry and exit）。" },
  { q:"寡占市場(Oligopoly)中最突出的特徵是什麼？", opts:["廠商追求營收極小化","政府完全控制價格","廠商之間存在高度的策略相互依存","產品絕對無法替代"], ans:2, exp:"寡占廠商的決策必須考量競爭對手的可能反應（策略相互依存）。" }
],

m3_nav:"3. 五力分析",
m3_title:"Porter 五力競爭架構",
m3_overview:"深入探討 Porter 五力分析，將經濟學理論轉化為實用的策略診斷工具。",
m3_highlights:"替代品威脅、進入者威脅、競爭對抗、買方議價力、供應商議價力。",
m3_deepdive:[
  "Michael Porter 的五力分析是將 SCP 典範具象化的經典架構。它從五個構面檢視產業的競爭強度與獲利潛力：包含三個「水平」的競爭來源（替代品、新進入者、既有對手）與兩個「垂直」的議價力量（供應商、買方）。",
  "水平競爭力決定了價格的天花板。替代品威脅取決於買方的轉換傾向與替代品的相對價格-效能比；新進入者威脅則受制於產業進入障礙的高低；既有競爭者的對抗強度，則由市場集中度、產品差異化程度、超額產能與退出障礙所共同決定。",
  "垂直議價力則決定了價值鏈中的利潤分配。當買方高度集中、轉換成本低，或具備向後垂直整合的威脅時，其議價力便會增強，從而壓低產業利潤；供應商的議價力邏輯亦同。五力的綜合作用，決定了產業長期的平均投資報酬率。"
],
m3_wrapup:"五力分析不是靜態的清單，而是一個系統。改變其中任何一股力量的結構決定因素，都會牽動整體的獲利版圖。",
m3_cards:[
  { front:"五力分析架構", back:"由 Michael Porter 提出，以替代品、潛在進入者、既有對手、買方與供應商五股力量評估產業吸引力。" },
  { front:"替代品 (Substitutes)", back:"滿足相同顧客需求但運用不同技術或形式的產品。其價格效能比會限制現有產業的定價空間。" },
  { front:"議價力 (Bargaining Power)", back:"買方或供應商藉由威脅拒絕交易或尋找替代方案，來壓低價格或提升品質要求的能力。" },
  { front:"水平與垂直力量", back:"水平代表同層級的競爭（對手、新進入者、替代品）；垂直代表供應鏈上下游的利潤分配（供應商、買方）。" }
],
m3_q:[
  { q:"Porter 五力中的兩個「垂直」力量是指什麼？", opts:["替代品與新進入者","買方議價力與供應商議價力","既有對抗與政府管制","技術創新與市場需求"], ans:1, exp:"垂直力量指的是沿著價值鏈上下游的買方與供應商議價力。" },
  { q:"決定「替代品威脅」強度的關鍵基礎是什麼？", opts:["競爭者的廣告預算","買方轉換傾向與替代品的相對價格-效能比","供應商的數量多寡","產業整體的固定成本"], ans:1, exp:"替代品能否構成威脅，端視其是否能提供更佳的性價比並促使消費者轉換。" },
  { q:"在高度集中的買方市場中，對供應產業的影響通常為何？", opts:["供應產業的獲利大幅提升","供應產業的定價能力遭削弱，利潤被壓縮","進入障礙自動升高","供應產業完全免於替代品威脅"], ans:1, exp:"買方越集中，其議價力越強，能有效壓低供應商的價格與利潤。" },
  { q:"下列何者會加劇「既有競爭者的對抗強度」？", opts:["市場高度集中呈現雙占","產品具備極高差異化與品牌忠誠","產業成長緩慢且固定成本比重極高","退出障礙非常低"], ans:2, exp:"低成長加上高固定成本，會驅使廠商為填補產能而發動激烈的價格戰。" }
],

m4_nav:"4. 進入與對抗",
m4_title:"進入障礙與產業對抗",
m4_overview:"聚焦於產業防禦機制的建立，探討進入障礙、退出障礙與成本結構的動態影響。",
m4_highlights:"規模經濟、絕對成本優勢、沉沒成本、退出障礙。",
m4_deepdive:[
  "進入障礙是新進入者相對於既有廠商所面臨的結構性劣勢。障礙越高，產業的超額利潤就越能獲得保護。Grant 歸納了七大核心障礙來源：資本需求、規模經濟、絕對成本優勢、產品差異化、通路取得限制、政府法規障礙，以及新進入者對既有廠商報復的預期。",
  "「可競爭市場理論」（Contestable Markets）指出，若產業不存在沉沒成本（Sunk Costs），即使是寡占結構也無法維持超額利潤，因為潛在競爭者能進行『打帶跑』的進入策略。這凸顯了不可回收投資在建立進入障礙中的關鍵作用。",
  "退出障礙與成本結構同樣深刻影響著對抗強度。當資產具備高度專用性、退出成本昂貴時，即便需求衰退，超額產能也難以離開市場，進而引爆毀滅性的價格戰。特別是在固定成本比率極高的產業（如航空、半導體代工），廠商為了攤提成本，往往願意以極低的邊際定價接單。"
],
m4_wrapup:"建構並維繫高聳的進入障礙，同時靈活管理退出機制與成本結構，是企業長期確保競爭優勢的基石。",
m4_cards:[
  { front:"進入障礙 (Entry Barriers)", back:"保護既有廠商免受新進者競爭的結構性門檻。包含規模經濟、資本門檻、法規保護等。" },
  { front:"退出障礙 (Exit Barriers)", back:"阻礙不具競爭力的產能離開市場的因素，如資產專用性或高額資遣費。會加劇產業的惡性競爭。" },
  { front:"沉沒成本 (Sunk Costs)", back:"已經投入且無法在退出市場時回收的成本。高沉沒成本是阻擋『打帶跑』進入策略的關鍵。" },
  { front:"絕對成本優勢", back:"既有廠商因為獨特資源（如優質礦場、早期學習曲線）而擁有新進者無法複製的低成本結構。" }
],
m4_q:[
  { q:"下列何者不屬於 Grant 歸納的七大進入障礙？", opts:["龐大的資本需求","規模經濟效益","高昂的員工分紅","政府與法規限制"], ans:2, exp:"員工分紅屬內部薪酬政策，並非阻擋外部潛在競爭者的結構性進入障礙。" },
  { q:"「可競爭市場理論」認為，即便市場只有少數廠商，只要缺乏何種要素，利潤仍會趨於正常水準？", opts:["產品差異化","沉沒成本 (Sunk Costs)","政府補助","強大的工會"], ans:1, exp:"若無沉沒成本，新進者能自由進出，迫使既有廠商不敢維持壟斷高價。" },
  { q:"「退出障礙」極高的產業，在面臨整體需求下滑時，最容易出現何種現象？", opts:["廠商迅速清算退出","超額產能滯留，導致持久的削價競爭","產業獲利率逆勢攀升","新競爭者大量湧入"], ans:1, exp:"高退出障礙使得產能無法順利去化，過剩供給將持續壓抑整體市場價格。" },
  { q:"高固定成本比重的產業（如航空業），為何容易爆發激烈的價格戰？", opts:["因為變動成本極高","為了盡可能填補產能以攤提龐大的固定成本","因為產品極具差異化","因為進入障礙極低"], ans:1, exp:"這類產業填補空位的邊際成本極低，故在面臨需求波動時極易採取降價搶客的策略。" }
],

m5_nav:"5. 預測與定位",
m5_title:"產業獲利預測與策略應用",
m5_overview:"從靜態分析走向動態預測，並探討企業如何主動塑造產業結構或尋找最佳定位。",
m5_highlights:"獲利預測步驟、定位策略、建築優勢、塑造結構。",
m5_deepdive:[
  "產業分析的核心價值不僅在於解釋過去，更在於預測未來與指導行動。預測產業獲利需要三步邏輯：首先，釐清現有結構如何導致目前的競爭態勢；其次，敏銳辨識正在改變這套結構的趨勢（如新技術、法規變動）；最後，評估這些變遷將如何重塑五力平衡與未來的獲利水準。",
  "面對既定結構，企業可採取「定位策略」（Positioning Strategy），在產業地圖中尋找競爭力量最為薄弱、最能發揮自身資源優勢的避風港，藉此規避正面衝突以獲取優於平均的報酬。",
  "更積極的作法是「改變產業結構」。Jacobides 提出的「建築優勢」（Architectural Advantage）概念主張，企業不應只是被動適應，而應主動重塑價值鏈。透過創造新的瓶頸環節（例如封閉的生態系 DRM）、解除他人的瓶頸壟斷，或重新定義參與者的角色分工，企業得以將產業利潤往自身傾斜。"
],
m5_wrapup:"卓越的策略家不只在既有的遊戲規則中尋找最佳位置，更能主動改寫產業結構的運作法則。",
m5_cards:[
  { front:"定位策略 (Positioning)", back:"在既有的產業五力結構中，辨識並佔領競爭力量最弱、最能防禦外部威脅的細分市場或策略位置。" },
  { front:"建築優勢 (Architectural Advantage)", back:"主動設計或改變產業價值鏈的結構與運作方式，透過掌控關鍵瓶頸來攫取超額利潤的策略思維。" },
  { front:"結構改變趨勢", back:"能從根本上撼動既有五力平衡的外部變數，例如破壞性創新技術、法規解禁或人口結構變遷。" },
  { front:"價值鏈瓶頸 (Bottleneck)", back:"在整個產業生態系中，具有稀缺性、不可替代且能被企業實質控制的關鍵活動環節。" }
],
m5_q:[
  { q:"預測產業未來獲利水準的第一步基礎工作為何？", opts:["直接套用過去五年的平均財報利潤率","分析現有產業結構如何決定目前的競爭與獲利水準","併購所有潛在的競爭對手","遊說政府提供高額補貼"], ans:1, exp:"必須先理解「現狀的因果關係」，才能推論未來趨勢改變帶來的影響。" },
  { q:"企業選擇避開紅海，專注於競爭對手較少的高階利基市場，這屬於何種策略應用？", opts:["降低退出障礙","垂直整合策略","定位策略 (Positioning)","擴充總體市場規模"], ans:2, exp:"尋找競爭壓力最小、最適合發揮自身優勢的市場區塊，即為典型的定位策略。" },
  { q:"Jacobides 提出的「建築優勢」核心概念鼓勵企業採取什麼行動？", opts:["無限制地擴大廠房建築規模","被動接受五力現狀並削減成本","主動重塑產業價值鏈結構以掌控利潤分配","全面退出實體製造轉向純軟體"], ans:2, exp:"建築優勢強調透過設計產業分工體系與掌握瓶頸，來主導整個生態系的利潤流向。" },
  { q:"Google 早期免費開源 Android 系統的策略，在改變產業結構上的主要目的為何？", opts:["藉由銷售硬體手機獲取暴利","消除 Apple 在行動作業系統環節的「瓶頸」壟斷優勢","完全消滅軟體開發的競爭對手","提高電信業者的議價能力"], ans:1, exp:"這是經典的「消除他人瓶頸」策略，確保行動上網的入口不被單一廠商掐住。" }
],

m6_nav:"6. 成功因素",
m6_title:"關鍵成功因素辨識",
m6_overview:"從產業整體的獲利分析，推進至探討個別企業如何在競爭中脫穎而出的關鍵要素。",
m6_highlights:"KSF、需求分析、競爭分析、獲利模型拆解。",
m6_deepdive:[
  "在理解了產業結構如何決定整體平均獲利之後，策略分析的下一階段必須回答：在同一個產業內，為什麼某些企業的績效能顯著超越對手？這仰賴於「關鍵成功因素」（Key Success Factors, KSF）的精準辨識。",
  "辨識 KSF 通常從兩個核心構面切入：第一是「顧客需求面」— 目標客群是誰？他們真正重視的價值（如低價、便利、品牌象徵）是什麼？第二是「競爭存活面」— 產業內的主要競爭維度為何？企業必須具備何種資源或能力，才能在激烈的競爭中存活並建立優勢？",
  "除了雙軸分析，我們也能運用「獲利模型拆解法」來萃取 KSF。例如，將零售業的資產報酬率（ROA）拆解為淨利率（反映定價力與成本控制）與資產周轉率（反映坪效與存貨管理），便能清晰指引出管理團隊必須極致優化的關鍵營運指標。"
],
m6_wrapup:"KSF 是連接外部環境分析與企業內部資源配置的橋樑；洞察 KSF，等同掌握了在特定產業中致勝的密碼。",
m6_cards:[
  { front:"關鍵成功因素 (KSF)", back:"在特定產業中，決定企業能否有效滿足顧客需求並超越競爭對手，進而獲取卓越績效的少數關鍵變數。" },
  { front:"需求面分析", back:"探究顧客是誰、他們的購買動機與選擇標準為何，以確立產品必須具備的核心價值主張。" },
  { front:"競爭面分析", back:"評估產業競爭的本質與強度，釐清企業必須建立何種進入障礙或成本優勢才能確保存活。" },
  { front:"獲利模型拆解", back:"透過杜邦方程式等財務模型，將最終的獲利指標（如 ROE/ROA）層層拆解，找出驅動利潤的最底層營運指標。" }
],
m6_q:[
  { q:"辨識 KSF (關鍵成功因素) 必須回答的兩個最核心問題是什麼？", opts:["固定成本多少？變動成本多少？","顧客需要什麼？企業如何在競爭中存活？","市場規模多大？年成長率多少？","政府法規為何？稅率高低？"], ans:1, exp:"KSF 的辨識立基於「需求分析」與「競爭生存分析」的雙軸交會。" },
  { q:"在超市零售業中，分析消費者追求「距離近、低價、品項齊全」是屬於 KSF 辨識的哪一個構面？", opts:["進入障礙分析","競爭存活面分析","顧客需求面分析","獲利模型拆解"], ans:2, exp:"探究消費者看重什麼價值與選擇標準，屬於需求面分析的範疇。" },
  { q:"利用財務公式（如將利潤拆解為載客率、收益率、單位成本）來尋找影響績效的驅動因子，稱為什麼方法？", opts:["五力分析模型","獲利模型拆解法 (Profitability Decomposition)","價值鏈定位法","PESTEL 宏觀掃描"], ans:1, exp:"將總體財務指標拆解為具體的營運變數，有助於管理者精確辨識管理重點與 KSF。" },
  { q:"關於 KSF，下列哪項敘述是正確的？", opts:["同一個產業內，所有獲利企業必定採取完全相同的策略來達成 KSF","KSF 會隨時間與產業結構變遷而改變","尋找 KSF 只能依靠直覺，無法系統化分析","KSF 指的是企業內部的專利數量"], ans:1, exp:"顧客需求與競爭態勢會改變，因此產業的關鍵成功因素也會隨之動態演化。" }
],

m1_nav:"1. Env & Boundaries",
m1_title:"From Macro Environment to Industry Analysis",
m1_overview:"Explores how to focus from the broad macro environment to the core industry environment that directly impacts firm performance.",
m1_highlights:"PESTEL, Industry vs Market, Demand/Supply Substitutability.",
m1_deepdive:[
  "A firm's external environment encompasses countless influences. PESTEL analysis (Political, Economic, Social, Technological, Ecological, Legal) provides a macro-level scanning framework. However, for these macro trends to affect the firm, they typically operate by altering its immediate 'industry environment'.",
  "'To make a profit, a firm must create value for customers. Hence, it must understand its customers, manage supplier relationships, and comprehend competition. These three sets of relationships form the core of the firm's industry environment.' — Robert M. Grant.",
  "Defining industry boundaries is the critical first step. Economists define an 'industry' as a group of firms supplying a market. Boundary definition requires considering both 'demand-side substitutability' (are consumers willing to switch?) and 'supply-side substitutability' (can producers easily switch production?). Boundaries depend on the strategic purpose of the analysis."
],
m1_wrapup:"Macro environmental changes act as triggers, while the industry environment is the direct battlefield for profitability. Precisely defining boundaries is prerequisite for structural analysis.",
m1_cards:[
  { front:"PESTEL Analysis", back:"Macro-environment scanning framework: Political, Economic, Social, Technological, Ecological, Legal factors." },
  { front:"Industry", back:"Defined by economists as a group of firms supplying a market (substitute/complementary products), from a production perspective." },
  { front:"Demand-side Substitutability", back:"Consumers' willingness to switch between products based on price and performance, key for market boundaries." },
  { front:"Supply-side Substitutability", back:"Producers' ability to switch existing capacity to produce different products, determining potential competitors." }
],
m1_q:[
  { q:"What do the 'E's in PESTEL stand for?", opts:["Economic & Ecological","Education & Environment","Economic & Education","Ecological & Ethical"], ans:0, exp:"Economic and Ecological." },
  { q:"According to Grant, what three relationships form the core of the industry environment?", opts:["Gov, media, rivals","Customers, suppliers, rivals","Shareholders, staff, clients","Tech, capital, talent"], ans:1, exp:"Customers, suppliers, and competitors." },
  { q:"What is the core economic principle for defining industry boundaries?", opts:["SIC codes","Demand & supply substitutability","Capital size","Supplier concentration"], ans:1, exp:"Substitutability is the benchmark for defining boundaries." },
  { q:"What distinguishes an 'Industry' from a 'Market'?", opts:["They are identical","Industry takes a production view, Market takes a consumption view","Industry is only manufacturing","Market is only physical"], ans:1, exp:"Industry focuses on supplying firms; Market focuses on consumer segments." }
],

m2_nav:"2. Industrial Organization",
m2_title:"Economic Foundations of Industry Structure",
m2_overview:"Introduces Industrial Organization (IO) economics, understanding how concentration affects conduct and profits.",
m2_highlights:"SCP Paradigm, Market Structure Spectrum, Oligopoly, HHI.",
m2_deepdive:[
  "The theoretical foundation of industry analysis comes from Industrial Organization (IO) economics, centered on the 'Structure-Conduct-Performance' (SCP) paradigm. SCP posits that basic conditions determine market structure, structure constrains firm conduct, and conduct determines profitability performance.",
  "The market structure spectrum ranges from perfect competition (many firms, no barriers, profits equal cost of capital) to pure monopoly (single firm, extreme barriers, captures all excess profit). Most real-world industries fall in between as 'Oligopoly' or 'Monopolistic Competition'.",
  "To quantify structure, concentration metrics are used. CR4 (top 4 market share) is intuitive; HHI (Herfindahl-Hirschman Index, sum of squared market shares) more precisely reflects the concentration of market power. An HHI over 2500 typically indicates a highly concentrated market."
],
m2_wrapup:"Understanding the SCP paradigm helps strategists see the economic logic behind phenomena and anticipate how structural shifts impact profitability.",
m2_cards:[
  { front:"SCP Paradigm", back:"Structure-Conduct-Performance. IO economics core framework indicating industry traits determine competitive dynamics and profit." },
  { front:"Oligopoly", back:"Market structure dominated by a few large firms, characterized by high strategic interdependence among competitors." },
  { front:"HHI Index", back:"Herfindahl-Hirschman Index. Sum of squared market shares; a quantitative metric for concentration and antitrust review." },
  { front:"Lerner Index", back:"Measures a firm's market power (pricing capability), calculated as (P - MC) / P. It is zero under perfect competition." }
],
m2_q:[
  { q:"What do S, C, P stand for in the SCP paradigm?", opts:["Strategy, Competition, Profit","Structure, Conduct, Performance","Supply, Cost, Price","Scale, Capability, Position"], ans:1, exp:"Structure, Conduct, Performance." },
  { q:"In US antitrust review, an HHI above what level is 'highly concentrated'?", opts:["1000","1500","2500","5000"], ans:2, exp:"HHI > 2500 represents high concentration." },
  { q:"Which is NOT a premise of a 'perfect competition' market?", opts:["Numerous buyers/sellers","Homogeneous products","Extreme entry/exit barriers","Perfect information"], ans:2, exp:"Perfect competition assumes free entry and exit (no barriers)." },
  { q:"What is the most prominent feature of an Oligopoly?", opts:["Minimizing revenue","Gov price control","High strategic interdependence among firms","Irreplaceable products"], ans:2, exp:"Firms must consider rivals' likely reactions (strategic interdependence)." }
],

m3_nav:"3. Five Forces",
m3_title:"Porter's Five Forces Framework",
m3_overview:"Deep dive into Porter's Five Forces, transforming economic theory into a practical strategic diagnostic tool.",
m3_highlights:"Substitutes, Entrants, Rivalry, Buyer Power, Supplier Power.",
m3_deepdive:[
  "Michael Porter's Five Forces translates the SCP paradigm into a classic framework. It examines competitive intensity and profit potential from five dimensions: three 'horizontal' sources (substitutes, entrants, existing rivals) and two 'vertical' bargaining forces (suppliers, buyers).",
  "Horizontal forces dictate the price ceiling. Substitute threat depends on buyers' propensity to switch and relative price-performance; entrant threat is governed by entry barriers; existing rivalry intensity is determined by concentration, differentiation, excess capacity, and exit barriers.",
  "Vertical bargaining power dictates value chain profit distribution. When buyers are highly concentrated, face low switching costs, or threaten backward integration, their power increases, suppressing industry margins. The same logic applies to suppliers. The interplay determines long-term average ROI."
],
m3_wrapup:"The Five Forces is a system. Altering the structural determinants of any single force shifts the entire profitability landscape.",
m3_cards:[
  { front:"Five Forces Framework", back:"Porter's tool evaluating industry attractiveness via substitutes, potential entrants, existing rivals, buyers, and suppliers." },
  { front:"Substitutes", back:"Products meeting similar needs via different tech/forms. Their price-performance limits industry pricing headroom." },
  { front:"Bargaining Power", back:"Ability of buyers/suppliers to depress prices or demand higher quality by threatening to walk away or find alternatives." },
  { front:"Horizontal & Vertical Forces", back:"Horizontal: peer competition (rivals, entrants, substitutes); Vertical: supply chain profit distribution (buyers, suppliers)." }
],
m3_q:[
  { q:"What are the two 'vertical' forces in Porter's framework?", opts:["Substitutes & Entrants","Buyer Power & Supplier Power","Rivalry & Gov Regulation","Tech Innovation & Demand"], ans:1, exp:"Vertical forces act along the value chain (suppliers and buyers)." },
  { q:"What fundamentally determines the 'threat of substitutes'?", opts:["Rivals' ad budgets","Buyer switching propensity & relative price-performance","Number of suppliers","Industry fixed costs"], ans:1, exp:"Threat relies on offering better value and inducing consumer switching." },
  { q:"How does a highly concentrated buyer market affect supplying industries?", opts:["Raises supplier profits significantly","Weakens supplier pricing power, squeezing margins","Automatically raises entry barriers","Immunizes suppliers from substitutes"], ans:1, exp:"Concentrated buyers have stronger bargaining power to force prices down." },

  { q:"Avoiding red oceans to focus on high-end niche markets with fewer rivals is an example of?", opts:["Lowering exit barriers","Vertical integration","Positioning Strategy","Expanding Total Addressable Market"], ans:2, exp:"Finding a segment with minimal competitive pressure tailored to strengths is positioning." },

m7_nav:"7. 互動實驗室",
m7_title:"互動實驗室",

m8_title:"外部學習資源",

date:"Version 2026.04.12",
copyright:"For Educational Use Only",
architect_label:"Architect:",
architect_name:"Prof. Shihmin Lo",
architect_url:"https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo"

};

/* ===== Main App ===== */
function App() {
  const [lang, setLang] = useState('en'); // Default EN
  const [isDark, setIsDark] = useState(true); // Default Dark
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  
  // Analytics & Student Info
  const [studentInfo, setStudentInfo] = useState({ group:'', dept:'', id:'', name:'' });
  const [saveSession, setSaveSession] = useState(false);
  const initAnalytics = {
    time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
    cardViewed: Array(TOTAL).fill(0), cardTotal: Array(TOTAL).fill(0),
    quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0)
  };
  const [analytics, setAnalytics] = useState(() => {
    const saved = sessionStorage.getItem('eia_analytics');
    return saved ? JSON.parse(saved) : initAnalytics;
  });

  const contentRef = useRef(null);
  const menuRef = useRef(null);
  const t = dict[lang];

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
  
  // Time tracking & session saving
  useEffect(() => { 
    const iv = setInterval(() => { 
      setAnalytics(a => { 
        const t2=[...a.time]; t2[module]++; 
        const newState = {...a, time:t2};
        if(saveSession) sessionStorage.setItem('eia_analytics', JSON.stringify(newState));
        return newState; 
      }); 
    }, 1000); 
    return () => clearInterval(iv); 
  }, [module, saveSession]);

  useEffect(() => { 
    if(saveSession) sessionStorage.setItem('eia_analytics', JSON.stringify(analytics));
    else sessionStorage.removeItem('eia_analytics');
  }, [saveSession, analytics]);

  useEffect(() => { window.scrollTo({top:0,behavior:'smooth'}); window.speechSynthesis?.cancel(); setTtsState('idle'); }, [module]);
  
  // Close menu on click outside
  useEffect(() => { 
    if(!menuOpen) return; 
    const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);}; 
    document.addEventListener('mousedown',h); 
    return()=>document.removeEventListener('mousedown',h); 
  }, [menuOpen]);

  const handleClick = () => setAnalytics(a => { const c=[...a.clicks]; c[module]++; return {...a, clicks:c}; });
  
  // Tracking Handlers
  const handleQuizTrack = (mId, correct, total) => setAnalytics(a => { 
    const qc=[...a.quizCorrect]; const qt=[...a.quizTotal]; 
    qc[mId]+=correct; qt[mId]+=total; 
    return {...a, quizCorrect:qc, quizTotal:qt}; 
  });

  const handleCardTrack = (mId, viewed, total) => setAnalytics(a => {
    const cv=[...a.cardViewed]; const ct=[...a.cardTotal];
    cv[mId]+=viewed; ct[mId] = total; // set max total
    return {...a, cardViewed:cv, cardTotal:ct};
  });

  /* === TTS Implementation (0412 Guidelines) === */
  const handleTTS = (action) => {
    if(!('speechSynthesis' in window)) return;
    if(action==='stop'){window.speechSynthesis.cancel();setTtsState('idle');return;}
    if(action==='pause'){window.speechSynthesis.pause();setTtsState('paused');return;}
    if(action==='play'){
      if(ttsState==='paused'){window.speechSynthesis.resume();setTtsState('playing');return;}
      window.speechSynthesis.cancel();
      const sep=lang==='zh'?'。 ':'. ';
      let texts=[];
      if(module===0){
        // Ensure to include the summary of the homepage SVG diagram in the read text
        const m0_diagram = lang==='zh' ? "全網頁架構包含：總體環境掃描、產業結構分析、以及企業定位策略與關鍵成功因素。" : "The framework covers Macro Environment Scanning, Industry Structure Analysis, and Firm Positioning Strategy & KSF.";
        texts=[t.m0_title, t.m0_intro, m0_diagram, t.m0_why, t.m0_why_desc,...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean);
      }
      else if(module>=1&&module<=N){
        const mk=`m${module}`;
        texts=[t[`${mk}_title`], t[`${mk}_overview`], t[`${mk}_highlights`], ...(t[`${mk}_deepdive`]||[]), t[`${mk}_wrapup`]].filter(Boolean);
      }
      else if(module===N+1){texts=[t.m7_title,t.m7_desc].filter(Boolean);}
      else if(module===N+2){texts=[t.m8_title,t.m8_desc].filter(Boolean);}
      else{
        // Add Weakness recommendation to TTS
        let weakText = "";
        let lowestAcc = 1;
        let weakModule = -1;
        for(let i=1; i<=N; i++){
          if(analytics.quizTotal[i]>0) {
            const acc = analytics.quizCorrect[i]/analytics.quizTotal[i];
            if(acc < lowestAcc) { lowestAcc = acc; weakModule = i; }
          }
        }
        if(weakModule !== -1 && lowestAcc < 1) {
            weakText = t.analytics_weak_detect.replace('{module}', t[`m${weakModule}_nav`]).replace('{acc}', Math.round(lowestAcc*100));
        } else {
            weakText = t.analytics_weak_perfect;
        }
        texts=[t.analytics_title, t.analytics_desc, t.analytics_weak_title, weakText].filter(Boolean);
      }
      
      const text=texts.join(sep);
      const u=new SpeechSynthesisUtterance(text); u.rate=0.95;
      const voices=window.speechSynthesis.getVoices();
      
      // Strict TTS matching based on 0412 spec
      if(lang==='zh'){
        const v = voices.find(v=>v.name.includes('Yating') && v.lang==='zh-TW') || 
                  voices.find(v=>v.lang==='zh-TW') || 
                  voices.find(v=>v.lang.startsWith('zh'));
        if(v) u.voice=v; u.lang='zh-TW';
      } else {
        const v = voices.find(v=>v.lang==='en-GB' && v.name.includes('Male')) || 
                  voices.find(v=>v.name.includes('Daniel')) || 
                  voices.find(v=>v.lang==='en-GB') || 
                  voices.find(v=>v.lang.startsWith('en'));
        if(v) u.voice=v; u.lang='en-GB';
      }
      u.onend=()=>setTtsState('idle'); u.onerror=()=>setTtsState('idle');
      window.speechSynthesis.speak(u); setTtsState('playing');
    }
  };

  /* === CSV Export (0412 Guidelines naming convention) === */
  const handleExportCSV = () => {
    // Sanitize inputs before export
    const safeName = DOMPurify.sanitize(studentInfo.name.replace(/,/g, ''));
    const safeId = DOMPurify.sanitize(studentInfo.id.replace(/,/g, ''));
    const safeGroup = DOMPurify.sanitize(studentInfo.group.replace(/,/g, ''));
    const safeDept = DOMPurify.sanitize(studentInfo.dept.replace(/,/g, ''));

    const bom='\uFEFF';
    const mKeys=[...Array(N).keys()].map(i=>`m${i+1}_nav`);
    let csv=bom+'Group,Dept,ID,Name,Module,Time(s),Clicks,CardsViewed,CardsTotal,QuizCorrect,QuizAns\n';
    
    mKeys.forEach((k,i)=>{
      const idx = i+1;
      csv+=`${safeGroup},${safeDept},${safeId},${safeName},${t[k]},${analytics.time[idx]},${analytics.clicks[idx]},${analytics.cardViewed[idx]},${analytics.cardTotal[idx]},${analytics.quizCorrect[idx]},${analytics.quizTotal[idx]}\n`;
    });
    
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    
    // Dynamic Filename: EIA_主標題_組別_學號_姓名_匯出日期.csv
    const dateStr = new Date().toISOString().split('T')[0].replace(/-/g,'');
    const safeTitle = t.title.split('|')[1]?.trim().substring(0,10) || 'EIA';
    a.download = `EIA_${safeTitle}_${safeGroup}_${safeId}_${safeName}_${dateStr}.csv`;
    a.click();
  };

  const modulesList = [
    { id:0, title:t.m0_nav, icon:<IconBookOpen size={16}/> },
    ...Array.from({length:N},(_,i)=>({ id:i+1, title:t[`m${i+1}_nav`], icon:[<IconGlobe size={16}/>,<IconCpu size={16}/>,<IconLayers size={16}/>,<IconFlag size={16}/>,<IconTrendingUp size={16}/>,<IconZap size={16}/>][i] })),
    { id:N+1, title:t.m7_nav, icon:<IconZapLab size={16}/> },
    { id:N+2, title:t.m8_nav, icon:<IconGlobe size={16}/> },
    { id:N+3, title:t.analytics_title, icon:<IconActivity size={16}/> },
  ];

  const renderNavBottom = () => (
    <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700 select-none">
      <button onClick={()=>setModule(Math.max(0,module-1))} disabled={module===0} className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider">← {t.nav_prev}</button>
      <button onClick={()=>setModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider shadow-md">{t.nav_next} <IconArrowRight size={16} className="ml-2"/></button>
    </div>
  );

  /* === Dynamic Module Rendering (0412 Expanded Content) === */
  const renderModule = (mNum) => {
    const mk = `m${mNum}`;
    return (
      <div className="space-y-6 text-base leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
        <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] border-b-2 border-[#D8C3A5] pb-4 select-none">{t[`${mk}_title`]}</h2>
        
        {/* Overview & Highlights */}
        <div className="bg-slate-50 dark:bg-slate-900/50 p-5 rounded-xl border-l-4 border-[#004030] dark:border-[#D8C3A5]">
            <p className="font-bold mb-2 text-[#004030] dark:text-[#D8C3A5]">Overview</p>
            <p className="text-sm">{t[`${mk}_overview`]}</p>
            <p className="text-sm mt-3"><span className="font-bold text-[#004030] dark:text-[#D8C3A5]">Highlights:</span> {t[`${mk}_highlights`]}</p>
        </div>

        {/* Deep Dive (Allows text selection for studying) */}
        <div className="space-y-4 my-8 font-serif leading-loose">
            {(t[`${mk}_deepdive`]||[]).map((p,i) => <p key={i}>{p}</p>)}
        </div>

        {/* SVG Diagram - Dynamically generated */}
        <ModuleSVG id={mNum} lang={lang} isDark={isDark} />

        {/* Wrap-up */}
        <div className="bg-[#004030] text-[#D8C3A5] p-5 rounded-xl font-bold font-serif my-6 select-none shadow-md">
            Wrap-up: {t[`${mk}_wrapup`]}
        </div>

        {/* FlipCards (Show 2 at a time) */}
        <CardContainer allCards={t[`${mk}_cards`]||[]} t={t} moduleId={module} onCardTrack={handleCardTrack} />

        {/* Quiz (Show 2 at a time) */}
        <QuizContainer questions={t[`${mk}_q`]||[]} t={t} moduleId={module} onQuizTrack={handleQuizTrack} />

        {renderNavBottom()}
      </div>
    );
  };

  const renderAnalytics = () => {
    const totalTime = analytics.time.reduce((a,b)=>a+b,0);
    const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
    const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
    const totalAnswered = analytics.quizTotal.reduce((a,b)=>a+b,0);
    const overallAcc = totalAnswered>0?Math.round(totalCorrect/totalAnswered*100)+'%':t.analytics_no_data;
    
    // Weakness Detection
    let lowestAcc = 1;
    let weakModule = -1;
    for(let i=1; i<=N; i++) {
        if(analytics.quizTotal[i] > 0) {
            const acc = analytics.quizCorrect[i] / analytics.quizTotal[i];
            if(acc < lowestAcc) { lowestAcc = acc; weakModule = i; }
        }
    }

    // Validation
    const canExport = studentInfo.group && studentInfo.id && studentInfo.name;
    const mNavKeys = Array.from({length:N},(_,i)=>`m${i+1}_nav`);

    return (
      <div className="space-y-6 text-base leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in select-none">
        <h2 className="text-2xl sm:text-3xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] border-b-2 border-[#D8C3A5] pb-4">{t.analytics_title}</h2>
        
        <div className="flex justify-between items-center mb-4">
            <p className="text-slate-500 dark:text-slate-400">{t.analytics_desc}</p>
            <label className="flex items-center gap-2 cursor-pointer text-sm font-bold">
                <input type="checkbox" checked={saveSession} onChange={e=>setSaveSession(e.target.checked)} className="accent-[#004030] dark:accent-[#D8C3A5] w-4 h-4"/>
                {t.analytics_save_toggle}
            </label>
        </div>

        <div className="grid grid-cols-3 gap-4">
          {[{label:t.analytics_total_time,val:totalTime+t.analytics_sec},{label:t.analytics_total_clicks,val:totalClicks+t.analytics_times},{label:t.analytics_overall_acc,val:overallAcc}].map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center shadow-sm">
              <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
              <p className="text-xs text-slate-500 mt-1">{s.label}</p>
            </div>
          ))}
        </div>
        
        {/* WEAKNESS ANALYSIS (Added 0412 Specs) */}
        <div className="bg-red-50 dark:bg-red-900/10 border-l-4 border-red-500 rounded-r-xl p-5 mb-6 shadow-sm">
            <h3 className="font-bold text-red-800 dark:text-red-400 mb-2 flex items-center gap-2"><IconTrendingUp size={18}/> {t.analytics_weak_title}</h3>
            {weakModule !== -1 && lowestAcc < 1 ? (
                <p className="text-sm text-red-700 dark:text-red-300">
                    {t.analytics_weak_detect.replace('{module}', t[`m${weakModule}_nav`]).replace('{acc}', Math.round(lowestAcc*100))}
                </p>
            ) : (
                <p className="text-sm text-green-700 dark:text-green-400">{t.analytics_weak_perfect}</p>
            )}
        </div>

        <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-x-auto shadow-sm">
          <table className="w-full text-sm min-w-[600px]"><thead><tr className="bg-[#004030] text-[#D8C3A5]">
            <th className="text-left p-3">{t.analytics_module}</th>
            <th className="text-center p-3">{t.analytics_time}</th>
            <th className="text-center p-3">{t.analytics_clicks}</th>
            <th className="text-center p-3">{t.analytics_cards_rate}</th>
            <th className="text-center p-3">{t.analytics_acc}</th>
            <th className="text-center p-3 hidden md:table-cell">{t.analytics_correct_ans_total}</th>
          </tr></thead>
          <tbody>{Array.from({length:N},(_,i)=>{
            const cv = analytics.cardViewed[i+1];
            const ct = analytics.cardTotal[i+1] || 1; // avoid /0
            const cardRate = analytics.cardTotal[i+1] > 0 ? Math.round(cv/ct*100)+'%' : t.analytics_no_data;
            const acc=analytics.quizTotal[i+1]>0?Math.round(analytics.quizCorrect[i+1]/analytics.quizTotal[i+1]*100)+'%':t.analytics_no_data;
            const ans=analytics.quizTotal[i+1]>0?`${analytics.quizCorrect[i+1]}/${analytics.quizTotal[i+1]}`:t.analytics_no_data;
            return <tr key={i} className="border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
              <td className="p-3 font-medium text-[#004030] dark:text-[#D8C3A5]">{t[mNavKeys[i]]}</td>
              <td className="p-3 text-center">{analytics.time[i+1]}{t.analytics_sec}</td>
              <td className="p-3 text-center">{analytics.clicks[i+1]}{t.analytics_times}</td>
              <td className="p-3 text-center">{cardRate}</td>
              <td className="p-3 text-center">{acc}</td>
              <td className="p-3 text-center hidden md:table-cell">{ans}</td>
            </tr>;
          })}</tbody></table>
        </div>

        <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
          <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
          <div className="grid grid-cols-2 gap-4">
            <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_group} *</label>
              <select value={studentInfo.group} onChange={e=>setStudentInfo({...studentInfo,group:e.target.value})} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"><option value="">--</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
            <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_dept}</label><input maxLength={20} value={studentInfo.dept} onChange={e=>setStudentInfo({...studentInfo,dept:e.target.value})} placeholder={t.analytics_dept_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
            <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_id} *</label><input maxLength={20} value={studentInfo.id} onChange={e=>setStudentInfo({...studentInfo,id:e.target.value})} placeholder={t.analytics_id_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
            <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_name} *</label><input maxLength={50} value={studentInfo.name} onChange={e=>setStudentInfo({...studentInfo,name:e.target.value})} placeholder={t.analytics_name_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
          </div>
          <button onClick={handleExportCSV} disabled={!canExport} className="mt-4 px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] transition-colors text-sm">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button>
        </div>
        {renderNavBottom()}
      </div>
    );
  };

  const renderContent = () => {
    if(module===0) return (
      <div className="space-y-8 text-base leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in select-none">
        <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white relative overflow-hidden">
          <div className="absolute top-0 right-0 p-4 opacity-10"><EiaLogo className="w-48 h-auto"/></div>
          <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3 relative z-10">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
          <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4 relative z-10">{t.m0_title}</h2>
          <p className="text-[#D8C3A5]/90 text-base leading-relaxed relative z-10 max-w-3xl">{t.m0_intro}</p>
        </div>
        
        {/* Added: Overall SVG diagram for entire website */}
        <ModuleSVG id={0} lang={lang} isDark={isDark} />

        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm">
          <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
          <p className="text-base">{t.m0_why_desc}</p>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {t.m0_stats.map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
              <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
              <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
            </div>
          ))}
        </div>
        <div>
          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
          <div className="space-y-3">
            {t.m0_modules.map((m,i)=>(
              <button key={i} onClick={()=>setModule(i+1)} className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md hover:border-[#D8C3A5] transition-all text-left group">
                <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{(i+1).toString().padStart(2,'0')}</div>
                <div className="flex-1 min-w-0"><div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div><div className="text-sm text-slate-500">{m.desc}</div></div>
                <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] shrink-0 transition-colors"/>
              </button>
            ))}
          </div>
        </div>
        <div className="flex justify-end"><button onClick={()=>setModule(1)} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white transition-colors rounded-lg shadow-md">{t.m0_start}</button></div>
      </div>
    );
    if(module>=1 && module<=N) return renderModule(module);
    
    // Module 7: Interactive Labs
    if(module===N+1) return (
      <div className="animate-fade-in space-y-8">
        <h2 className="text-3xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] border-b-2 border-[#D8C3A5] pb-4 select-none">{t.m7_title}</h2>
        <p className="mb-6 select-none">{t.m7_desc}</p>
        <FiveForcesDiagram lang={lang}/>
        <div className="grid md:grid-cols-2 gap-6">
          <HHICalculator lang={lang}/>
          <BarrierSimulator lang={lang}/>
        </div>
        <ProfitabilityChart lang={lang}/>
        <KSFAnalyzer lang={lang}/>
        {renderNavBottom()}
      </div>
    );

    // Module 8: Learning Resources
    if(module===N+2) {
      const links = [
        { label: lang==='zh'?'Porter 五力分析原始論文 (HBR)':'Porter Five Forces Original Paper (HBR)', url:'https://hbr.org/2008/01/the-five-competitive-forces-that-shape-strategy', desc: lang==='zh'?'Michael Porter 2008 年更新版，完整闡述五力分析的理論與應用。':'Michael Porter\'s 2008 updated article on the Five Forces framework.' },
        { label: lang==='zh'?'Grant: Contemporary Strategy Analysis':'Grant: Contemporary Strategy Analysis', url:'https://www.wiley.com/en-us/Contemporary+Strategy+Analysis-p-9781119815235', desc: lang==='zh'?'本課程主要教科書，第三章為產業分析基礎。':'Main textbook for this course; Chapter 3 covers industry analysis fundamentals.' },
      ];
      const other = [
        { icon:'🎬', cat: lang==='zh'?'影音教材':'Video Materials', items:[
          { label: lang==='zh'?'Harvard Business School: Five Forces Explained':'HBS: Five Forces Explained', url:'https://www.youtube.com/watch?v=mYF2_FBCvXw', desc: lang==='zh'?'Porter 本人講解五力分析的經典影片。':'Porter himself explains the Five Forces framework.' },
          { label: lang==='zh'?'台積電商業模式解析 (YouTube)':'TSMC Business Model Analysis', url:'https://www.youtube.com/results?search_query=TSMC+business+model+analysis', desc: lang==='zh'?'多部深度分析台積電護城河與產業結構的影片。':'Videos analyzing TSMC\'s moat and industry structure.' },
        ]},
        { icon:'📊', cat: lang==='zh'?'產業報告':'Industry Reports', items:[
          { label: lang==='zh'?'PwC 電信業策略報告':'PwC Telecom Strategy Report', url:'https://www.pwc.tw/zh/publications/global-insights/strategic-choices-telecom-industry.html', desc: lang==='zh'?'PwC Strategy& 關於電信業結構轉變與策略選擇的深度分析。':'PwC Strategy& deep analysis on telecom structural transformation.' },
          { label: lang==='zh'?'Deloitte 電信業資料分析應用':'Deloitte Telecom Data Analytics', url:'https://www2.deloitte.com/tw/tc/pages/risk/articles/newsletter-05-20.html', desc: lang==='zh'?'探討電信業如何運用資料分析因應產業結構變化。':'How telecom leverages data analytics amid structural changes.' },
        ]},
        { icon:'📚', cat: lang==='zh'?'學術資源':'Academic Resources', items:[
          { label: lang==='zh'?'維基百科：五力分析':'Wikipedia: Five Forces', url:'https://zh.wikipedia.org/zh-tw/%E4%BA%94%E5%8A%9B%E5%88%86%E6%9E%90', desc: lang==='zh'?'五力分析的完整介紹與各力量指標說明。':'Complete overview of Five Forces with indicator descriptions.' },
          { label: lang==='zh'?'台灣產業經濟服務網 (IEK)':'Taiwan IEK Industrial Economics', url:'https://www.moeaidb.gov.tw/', desc: lang==='zh'?'經濟部工業局產業資訊，提供台灣各產業結構數據。':'MOEA industrial data providing Taiwan industry structure statistics.' },
        ]},
      ];
      return (
        <div className="animate-fade-in space-y-8 select-none">
          <h2 className="text-3xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] border-b-2 border-[#D8C3A5] pb-4 mb-6">{t.m8_title}</h2>
          <p className="mb-6">{t.m8_desc}</p>
          <div className="grid md:grid-cols-2 gap-4">{links.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
          {other.map((sec,si)=>(
            <div key={si} className="mt-8">
              <h3 className="flex items-center gap-2 text-base font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-4"><span>{sec.icon}</span>{sec.cat}</h3>
              <div className="grid md:grid-cols-2 gap-4">{sec.items.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
            </div>
          ))}
          <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 mt-8 border border-[#004030]/20 dark:border-[#D8C3A5]/20">
            <p className="text-sm text-slate-600 dark:text-slate-400">⚠️ {lang==='zh'?'以上連結僅供學術參考，內容版權歸原作者所有。連結有效性可能因時間而異。':'Links are for academic reference only. Content copyrights belong to original authors. Link validity may change over time.'}</p>
          </div>
          {renderNavBottom()}
        </div>
      );
    }
    
    // Module 9: Analytics
    if(module===N+3) return renderAnalytics();
  };

  return (
    <div className={`min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030] flex flex-col overflow-x-hidden pt-16`}>
      {/* Header UI select-none for protection */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30 select-none">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 lg:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center space-x-3">
            <div className="relative" ref={menuRef}>
              <button className="p-2 hover:bg-white/10 rounded-lg transition-colors" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}</button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100]">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span><span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-3 hover:opacity-80 transition-opacity">
              <EiaLogo />
              <div className="hidden sm:block text-left"><h1 className="font-serif font-bold text-sm md:text-base leading-tight">{t.title.split('|')[1]?.trim() || t.title}</h1></div>
            </button>
          </div>
          <div className="flex items-center space-x-1">
            <div className="flex items-center space-x-1 mr-2">
              {ttsState!=='playing'?<button onClick={()=>handleTTS('play')} title={t.audio_read} className="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center space-x-1 text-xs"><IconPlay size={14}/><span className="hidden md:inline">{t.audio_read}</span></button>
              :<button onClick={()=>handleTTS('pause')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconPause size={14}/></button>}
              {ttsState!=='idle'&&<button onClick={()=>handleTTS('stop')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconSquare size={14}/></button>}
            </div>
            <button onClick={()=>{setLang(lang==='zh'?'en':'zh');window.speechSynthesis?.cancel();setTtsState('idle');}} className="px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-sm font-bold transition-colors">{lang==='zh'?'EN':'中文'}</button>
            <button onClick={()=>setIsDark(!isDark)} className="p-2 rounded-full hover:bg-white/10 transition-colors">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>

      <div className="max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 flex-1 flex flex-col md:flex-row gap-0 py-6">
        <aside className="hidden md:block w-64 shrink-0 mr-6 select-none">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden sticky top-24">
            <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
            <nav className="space-y-0.5 p-2 max-h-[calc(100vh-10rem)] overflow-y-auto">
              {modulesList.map(m=>(
                <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}} className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] dark:bg-[#D8C3A5]/20 text-white dark:text-[#D8C3A5] border border-[#D8C3A5]/30':'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                  <span className={`mr-2.5 ${module===m.id?'text-[#D8C3A5]':'opacity-50'}`}>{m.icon}</span><span className="truncate">{m.title}</span>
                  {module===m.id&&<IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}
                </button>
              ))}
            </nav>
          </div>
        </aside>

        <main ref={contentRef} className="flex-1 min-w-0" onClick={handleClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
             {renderContent()}
          </div>
        </main>
      </div>

      <footer className="bg-[#004030] dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-[#D8C3A5] select-none">
        <div className="max-w-7xl mx-auto px-4 h-8 flex justify-between items-center text-[10px] sm:text-xs">
          <div className="flex items-center space-x-2 md:space-x-4">
            <span className="truncate">{t.copyright} · {t.date}</span>
          </div>
          <div className="flex items-center space-x-3 md:space-x-4">
            <span className="text-[#D8C3A5]/70 font-serif hidden sm:inline">Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a></span>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center uppercase tracking-widest hover:text-white transition-colors border-l border-slate-600 pl-3"><IconChevronUp size={12} className="md:mr-1"/><span className="hidden sm:inline">TOP</span></button>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
